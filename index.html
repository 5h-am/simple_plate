<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
        <script src="script.js" defer></script>
        <title>Recipe Page</title>
    </head>
    <body>
        <div class="filter-options hidden">
            <a href="#" class="filter-option">Category</a>
            <a href="#" class="filter-option">Main Ingredient</a>
            <a href="#" class="filter-option">Area</a>
        </div>
        <div class="container">
            <nav class="nav-options">
                <div class="filter">
                    <span class="material-symbols-outlined filter-icon">filter_alt</span>
                </div>                
                <div class="search">      
                    <span class="material-symbols-outlined search-icon">search</span>
                </div>
            </nav>
            <article class="animation-box card">
                <p class="category-card-text">Seafood</p>
                <p class="animation-card-text">Garlicky prawns with sherry</p>
            </article>
            <div class="animation-nav">
                <div><span class="material-symbols-outlined arrow-back-icon">arrow_back_ios_new</span></div>
                <div><span class="material-symbols-outlined arrow-next-icon">arrow_forward_ios</span></div>
            </div>
            <div class="filtered-box">         

            </div>
            <div class="recipes">

            </div>
        </div>
    </body>
</html>
